name: CloudGuard Security Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main


permissions:
  contents: read


jobs:

  checkov:
    name: Checkov Kubernetes Security Scan

    runs-on: ubuntu-latest


    steps:

    - name: Checkout repository
      uses: actions/checkout@v4


    - name: Run Checkov
      uses: bridgecrewio/checkov-action@v12
      with:
        directory: gitops/

  gitleaks-scan:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0


      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
