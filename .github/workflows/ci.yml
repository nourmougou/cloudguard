name: CloudGuard Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checkov:
    name: Checkov Kubernetes Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: gitops/

  gitleaks-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  trivy-kubernetes:
    name: Trivy Kubernetes Config Scan
    runs-on: ubuntu-latest
    needs:
      - gitleaks-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Kubernetes Config Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: gitops/
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table


  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    needs:
      - trivy-kubernetes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@18f289c872365e0036109df077977eb7b93f21ef
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table


  trivy-image:
    name: Trivy Nginx Image Scan
    runs-on: ubuntu-latest
    needs:
      - trivy-filesystem

    steps:
      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: nginx:latest
          severity: HIGH,CRITICAL
          exit-code: 1
          format: table
