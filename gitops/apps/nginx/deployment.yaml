apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-nginx
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: demo-nginx

  template:
    metadata:
      labels:
        app: demo-nginx

    spec:

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: nginx
        image: nginx:1.27.0

        ports:
        - containerPort: 80

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5

        volumeMounts:

        - name: nginx-cache
          mountPath: /var/cache/nginx

        - name: nginx-run
          mountPath: /var/run

        - name: nginx-temp
          mountPath: /tmp


      volumes:

      - name: nginx-cache
        emptyDir: {}

      - name: nginx-run
        emptyDir: {}

      - name: nginx-temp
        emptyDir: {}