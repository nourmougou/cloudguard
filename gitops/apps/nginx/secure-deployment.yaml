apiVersion: apps/v1
kind: Deployment

metadata:
  name: secure-nginx
  namespace: demo

spec:
  replicas: 1

  selector:
    matchLabels:
      app: secure-nginx

  template:
    metadata:
      labels:
        app: secure-nginx

    spec:

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: nginx
        image: nginx:1.27.0

        ports:
        - containerPort: 8080

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true

          runAsNonRoot: true
          runAsUser: 10001
          runAsGroup: 10001

          capabilities:
            drop:
            - ALL

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "256Mi"

        volumeMounts:

        - name: nginx-cache
          mountPath: /var/cache/nginx

        - name: nginx-run
          mountPath: /var/run

        - name: nginx-tmp
          mountPath: /tmp

      volumes:

      - name: nginx-cache
        emptyDir: {}

      - name: nginx-run
        emptyDir: {}

      - name: nginx-tmp
        emptyDir: {}
